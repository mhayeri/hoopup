<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/hoopup/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="HoopUp — find a basketball court, RSVP to a pickup game, get on the floor."
    />
    <meta property="og:title" content="HoopUp — pickup basketball, organized" />
    <meta
      property="og:description"
      content="Find a court near you, RSVP to a game, and show up knowing exactly who's running with you."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mhayeri.github.io/hoopup/" />
    <meta name="theme-color" content="#0c0a08" />
    <!-- Resolve + apply the theme before first paint so light-mode users never
         see a flash of dark: localStorage -> system preference -> dark. The
         ThemeProvider reads this attribute back to stay in sync. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('hoopup.theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <!-- Type system declared in index.css's @theme:
         display  — Big Shoulders Display (variable weight, condensed athletic)
         body     — Archivo (variable weight + width; wide caps for kicker labels)
         mono     — Spline Sans Mono (times, counts, box-score numerals) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@300..900&family=Archivo:ital,wdth,wght@0,100..125,300..900;1,100..125,300..900&family=Spline+Sans+Mono:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <title>HoopUp — pickup basketball, organized</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
