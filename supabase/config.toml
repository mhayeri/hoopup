project_id = "cnqtnomndqcuxeogzihb"

[api]
enabled = true
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
schema_paths = []

[auth]
enabled = true
site_url = "http://localhost:5173/hoopup/"
additional_redirect_urls = [
  "http://localhost:5173/hoopup/",
  "https://mhayeri.github.io/hoopup/",
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8
# Require a mix of lower/upper letters and digits (beyond the length minimum).
password_requirements = "lower_upper_letters_digits"

# Per-IP / per-hour caps on auth endpoints. These pin intent for local dev and,
# when pushed (`supabase config push`) or mirrored in the Dashboard, for the
# hosted project. Values track Supabase's conservative defaults.
[auth.rate_limit]
email_sent = 10
sign_in_sign_ups = 30
token_refresh = 150
token_verifications = 30
anonymous_users = 30

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
# Changing a password requires a fresh (recently-authenticated) session.
secure_password_change = true

[auth.sms]
enable_signup = false
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "5MiB"

[storage.image_transformation]
enabled = true

[functions.delete-account]
verify_jwt = true

# Sign-in endpoint: callers are logged out, so no JWT. Auth is enforced inside
# the function (password check) and abuse is throttled per IP.
[functions.login]
verify_jwt = false
